<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORAL TASK I</title>

<style>
:root {
    --blue: #002147;
    --gold: #F39200;
    --bg: #f4f7f9;
    --red: #ef4444;
}

body {
    font-family: Arial;
    background: var(--bg);
    display: flex;
    justify-content: center;
    padding: 20px;
}

.container { max-width: 750px; width: 100%; }

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* HEADER */
.header {
    background: var(--blue);
    color: white;
    padding: 20px;
    border-radius: 15px;
    font-size: 1.5rem;
    text-align: center;
    margin-bottom: 20px;
}

/* INPUTS */
.inputs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 15px;
}

.inputs input {
    padding: 16px;
    font-size: 1rem;
    border-radius: 12px;
    border: 2px solid #ccc;
}

.full { grid-column: span 2; }

/* IMAGES */
.images iframe {
    width: 100%;
    height: 220px;
    margin-bottom: 10px;
    border-radius: 10px;
}

/* TIMER */
.timer {
    font-size: 2.2rem;
    text-align: center;
    color: var(--red);
    margin: 15px 0;
    font-weight: bold;
}

/* BUTTONS */
button {
    padding: 15px;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
    font-size: 1rem;
}

.start { background: var(--blue); color: white; }
.stop { background: var(--red); color: white; }
.send { background: var(--gold); color: white; }
.retry { background: #64748b; color: white; }

/* AUDIO */
audio {
    margin-top: 10px;
}

/* STATUS */
#status {
    margin-top: 10px;
    font-weight: bold;
    text-align: center;
}

/* SUCCESS */
.success {
    display: none;
    text-align: center;
    font-size: 1.3rem;
    color: green;
    margin-top: 15px;
}
</style>
</head>

<body>
<div class="container">

<div class="card">

<div class="header">ORAL TASK I</div>

<div class="inputs">
    <input id="firstName" placeholder="First Name">
    <input id="lastName" placeholder="Last Name">
    <input id="sClass" class="full" placeholder="Class">
</div>

<div class="images">
    <iframe src="https://drive.google.com/file/d/1ywbQsGcOJ4wacgMKmZWTdbRwRmrCs7Vx/preview"></iframe>
    <iframe src="https://drive.google.com/file/d/1HKFcI9k6yBWfxf-Dx-dP5EQg9PL7wX4y/preview"></iframe>
</div>

<div class="timer" id="timer">00:00</div>

<button id="startBtn" class="start" onclick="startRecording()">🎙️ Start Recording</button>

<button id="stopBtn" class="stop" onclick="stopRecording()" style="display:none;">
⏹️ Stop Recording
</button>

<audio id="audio" controls style="width:100%;"></audio>

<button class="send" onclick="upload()">Send to Teacher</button>
<button class="retry" onclick="location.reload()">Reset</button>

<div id="status"></div>
<div class="success" id="success">Sent successfully ✅</div>

</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyowky-5tJ-rRVRdlZ-0FGWmg6pnJPxea8n9bQcoOjCSqQlnsYJyCBaDJQwR_BZ_-E/exec";
const MAX_TIME = 120;

let mediaRecorder, chunks = [], seconds = 0, timerInterval;
let audioBlob, listened = false;

const timer = document.getElementById("timer");
const audio = document.getElementById("audio");

audio.onplay = () => listened = true;

async function startRecording() {

    if (!firstName.value || !lastName.value) {
        alert("Complete your name");
        return;
    }

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.start();

    chunks = [];

    mediaRecorder.ondataavailable = e => chunks.push(e.data);

    mediaRecorder.onstop = () => {
        audioBlob = new Blob(chunks, { type: 'audio/mp3' });
        audio.src = URL.createObjectURL(audioBlob);
    };

    document.getElementById("startBtn").style.display = "none";
    document.getElementById("stopBtn").style.display = "block";

    seconds = 0;

    timerInterval = setInterval(() => {

        seconds++;

        let m = String(Math.floor(seconds/60)).padStart(2,'0');
        let s = String(seconds%60).padStart(2,'0');

        timer.textContent = `${m}:${s}`;

        if (seconds >= MAX_TIME) stopRecording();

    }, 1000);
}

function stopRecording() {

    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }

    clearInterval(timerInterval);

    document.getElementById("stopBtn").style.display = "none";
}

function upload() {

    if (!audioBlob) {
        alert("Record first!");
        return;
    }

    if (!listened) {
        alert("Listen your audio first");
        return;
    }

    const reader = new FileReader();
    reader.readAsDataURL(audioBlob);

    reader.onloadend = () => {

        const base64 = reader.result.split(',')[1];

        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "cors",
            body: JSON.stringify({
                base64,
                filename: `${lastName.value}_${firstName.value}_${sClass.value}.mp3`,
                name: firstName.value,
                lastname: lastName.value,
                class: sClass.value
            })
        });

        document.getElementById("status").innerText = "⏳ Sending...";

        setTimeout(() => {
            document.getElementById("success").style.display = "block";
            document.getElementById("status").innerText = "";
            seconds = 0;
            timer.textContent = "00:00";
        }, 2000);
    };
}
</script>

</body>
</html>
